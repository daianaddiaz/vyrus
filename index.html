<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyrus</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Tourney:ital,wght@0,100..900;1,100..900&display=swap');</style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.0.0/pixi.min.js"></script>
</head>
<body>

    <div id="game-container">
        
        <div id="ui-overlay">
            
            <div class="caos-container">
                <span class="caos-label">NIVEL DE CAOS:</span>
                <div class="caos-bar-max">
                    <div id="caos-bar-fill"></div>
                </div>
                <div id="cronometro">00:00</div>


</div>
            </div>

    <div id="game-over-screen" class="overlay-screen" style="display: none;">
        <div class="modal-content">
            <h1>PERDISTE</h1>
            <p>El virus consumió por completo la placa de Petri!</p>
        <button id="btn-restart" class="pixel-btn">Intentar de Nuevo</button>
    </div>
    </div>

    <div id="victory-screen" class="overlay-screen victory" style="display: none;">
    <div class="modal-content victory-border">
        <h1>¡SOBREVIVISTE!</h1>
        <p>Lograste contener la infección y salvar la muestra biológica.</p>
        <button id="btn-restart-victory" class="pixel-btn victory-btn">Jugar de Nuevo</button>
    </div>
    </div>


</div>

    <script type="module" src="./clases/gameObject.js"></script>
    <script type="module" src="./clases/bacteria.js"></script>
    <script type="module" src="./clases/virus.js"></script>
    <script type="module" src="./clases/juego.js"></script>
    <script type="module" src="./clases/torre.js"></script>
    
</body>
</html>
